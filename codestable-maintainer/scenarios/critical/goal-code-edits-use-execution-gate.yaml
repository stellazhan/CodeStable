        "read_goal_state",
        "read_execution_conventions",
        "worktree_start_gate",
        "owner_stop:linked_worktree_required"
      ],
      "forbidden_actions": ["write:src/app.py", "commit", "merge"]
    },
    "commands": [
      {
        "cmd": ["python3", ".codestable/tools/codestable-worktree-gate.py", "--root", ".", "--json", "start", "--unit", ".codestable/features/2026-06-10-demo"],
        "exit_code": 1,
        "json": [
          {"path": "ok", "equals": false},
          {"path": "linked_worktree", "equals": false},
          {"path": "findings.0.message", "contains": "linked execution worktree"}
        ]
      }
    ],
    "artifacts": {
      "must_exist": [".codestable/goals/2026-06-21-fix-demo/state.yaml"],
      "contains": [
        {"path": ".codestable/goals/2026-06-21-fix-demo/state.yaml", "text": "next_action: Start the execution gate before code edits."}
      ]
    },
    "git": {
      "must_not_modify": ["src/**"]
    }
  }
}
