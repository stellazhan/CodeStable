{
  "id": "review-packet-redacts-secrets",
  "fixture": "review-packet-repo",
  "runs": 1,
  "actor": {
    "context": "sterile",
    "script": [
      {
        "run": [
          "python3",
          ".codestable/tools/build-review-packet.py",
          "--root",
          ".",
          "--unit",
          ".codestable/features/2026-06-10-demo",
          "--stage",
          "quality",
          "--output",
          ".codestable/review-packet.md",
          "--validation",
          "pytest -> passed"
        ]
      }
    ]
  },
  "expect": {
    "artifacts": {
      "must_create": [".codestable/review-packet.md"],
      "contains": [
        {"path": ".codestable/review-packet.md", "text": "Code Quality Review Packet"}
      ],
      "forbidden_text": [
        {"path": ".codestable/review-packet.md", "text": "supersecretvalue"},
        {"path": ".codestable/review-packet.md", "text": "should_not_appear"}
      ]
    }
  }
}
