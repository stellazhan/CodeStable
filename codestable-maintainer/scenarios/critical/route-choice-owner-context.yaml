          "content": "---\ndoc_type: approval-report\nunit: .codestable/features/2026-06-10-route-choice\nstatus: pending\nreason: route-choice\ncreated_at: 2026-06-18\n---\n\n# Approval Report\n\n## Decision Needed\nChoose the canonical requirement for this source scout work.\n\n## Why Now\nContinuing design or requirement delta work requires knowing which long-lived spec is the source of truth.\n\n## Context\nSpec routing found multiple plausible requirement docs: source-discovery and source-query-coverage.\n\n## Options\n1. Use source-discovery as canonical: emphasizes crawl entry behavior.\n2. Use source-query-coverage as canonical: emphasizes query coverage evidence.\n\n## Recommendation\nStop and choose before writing design or delta because both specs match.\n\n## Risks And Tradeoffs\nChoosing the wrong canonical spec writes future design and delta into the wrong long-lived context.\n\n## Non-Automatic Actions\nThis does not rewrite requirements, commit, merge, or choose for the owner.\n\n## After You Answer\nContinue design or requirement delta against the selected canonical requirement.\n"
        }
      },
      {"say": "Route choice wrote approval-report.md before selecting the canonical spec."},
      {"owner_stop": "route_choice"}
    ]
  },
  "expect": {
    "transcript": {
      "contains": ["approval-report.md", "canonical spec"],
      "must_stop_for": ["route_choice"]
    },
    "trajectory": {
      "required_actions": [
        "read_attention",
        "read_approval_conventions",
