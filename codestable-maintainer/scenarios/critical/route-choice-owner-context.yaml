{
  "id": "route-choice-owner-context",
  "fixture": "ambiguous-requirements-repo",
  "runs": 1,
  "setup": {
    "files": [
      {
        "path": ".codestable/features/2026-06-10-route-choice/route-choice-design.md",
        "content": "---\ndoc_type: feature-design\nfeature: route-choice\nstatus: draft\n---\n\n# Design\n\nRoute choice fixture.\n"
      }
    ]
  },
  "actor": {
    "context": "sterile",
    "script": [
      {"action": "read_attention"},
      {"action": "spec_router"},
      {
        "run": [
          "python3",
          ".codestable/tools/build-context-packet.py",
          "--root",
          ".",
          "--unit",
          ".codestable/features/2026-06-10-route-choice",
          "--audience",
          "owner-judgment",
          "--language",
          "zh",
          "--output",
          ".codestable/route-choice-owner-context.md",
          "--decided",
          "不能在多个 plausible requirement 之间替 owner 拍板。",
          "--rejected",
          "不把 ambiguous route 当成默认 route。",
          "--risk",
          "选错 canonical spec 会让后续 design 和 delta 写到错误位置。",
          "--file",
          ".codestable/requirements/source-discovery.md",
          "--file",
          ".codestable/requirements/source-query-coverage.md",
          "--remaining",
          "等待 owner 选择 canonical requirement。",
          "--evidence",
          "spec router selected multiple requirement docs",
          "--judgment",
          "选择本次 source scout work 的 canonical requirement",
          "--why-now",
          "继续写 design 或 delta 前必须知道哪个长期 spec 是事实来源。",
          "--term",
          "canonical requirement = 本次长期能力边界的权威 requirement 文档",
          "--option",
          "source-discovery：偏抓取入口；source-query-coverage：偏 query 覆盖证据。",
          "--default-recommendation",
          "先停下选择 canonical requirement，因为两个 spec 都命中。",
          "--effect",
          "owner 选择后才进入 design 或 req-delta。",
          "--non-automatic",
          "不会自动改 requirement、commit、merge 或替 owner 选择。"
        ]
      },
      {"say": "Route choice requires owner context before selecting the canonical spec."},
      {"owner_stop": "route_choice"}
    ]
  },
  "expect": {
    "transcript": {
      "contains": ["Route choice requires owner context"],
      "must_stop_for": ["route_choice"]
    },
    "trajectory": {
      "required_actions": ["read_attention", "spec_router", "owner_stop:route_choice"],
      "forbidden_actions": ["rewrite_requirement", "commit", "merge"]
    },
    "commands": [
      {
        "cmd": ["python3", ".codestable/tools/codestable-spec-governance.py", "--root", ".", "--json", "route", "--query", "source scout query coverage before crawl"],
        "exit_code": 0,
        "json": [
          {"path": "clarification_required", "equals": true},
          {"path": "selected_specs", "min_len": 2}
        ]
      },
      {
        "cmd": ["python3", ".codestable/tools/check-context-sufficiency.py", "--file", ".codestable/route-choice-owner-context.md", "--strict", "--json"],
        "exit_code": 0,
        "json": [
          {"path": "ok", "equals": true}
        ]
      }
    ],
    "artifacts": {
      "must_create": [".codestable/route-choice-owner-context.md"],
      "contains": [
        {"path": ".codestable/route-choice-owner-context.md", "text": "canonical requirement"}
      ]
    },
    "git": {
      "must_not_modify": [".codestable/requirements/*.md", "src/**"]
    }
  }
}
