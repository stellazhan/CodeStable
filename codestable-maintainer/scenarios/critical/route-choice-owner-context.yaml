{
  "id": "route-choice-owner-context",
  "fixture": "ambiguous-requirements-repo",
  "runs": 1,
  "setup": {
    "files": [
      {
        "path": ".codestable/features/2026-06-10-route-choice/route-choice-design.md",
        "content": "---\ndoc_type: feature-design\nfeature: route-choice\nstatus: draft\n---\n\n# Design\n\nRoute choice fixture.\n"
      }
    ]
  },
  "actor": {
    "context": "sterile",
    "script": [
      {"action": "read_attention"},
      {"action": "read_approval_conventions"},
