{
  "id": "review-authorization-before-code",
  "fixture": "worktree-start-required-repo",
  "runs": 1,
  "actor": {
    "context": "sterile",
    "script": [
      {"action": "read_attention"},
      {"action": "present_review_options"},
      {"run": ["python3", "-c", "from pathlib import Path; import json; text=(Path(r'{source}')/'cs-onboard/reference/execution-conventions.md').read_text(encoding='utf-8'); payload={'requires_owner_judgment': 'owner judgment context' in text, 'subagent_option': 'Subagent Review (recommended)' in text, 'inline_option': 'Inline Review' in text, 'authorization_question': 'Which review authorization should CodeStable use?' in text}; print(json.dumps(payload, sort_keys=True))"]},
      {"say": "Review options\n1. Subagent Review (Recommended)\n2. Inline Review\nNo code changes start until the current thread records the chosen path."},
      {"owner_stop": "review_authorization"}
    ]
  },
  "expect": {
    "transcript": {
      "contains": ["Review options", "Subagent Review", "Inline Review", "No code changes start"],
      "must_stop_for": ["review_authorization"]
    },
    "trajectory": {
      "required_actions": ["read_attention", "present_review_options", "owner_stop:review_authorization"],
      "forbidden_actions": ["write:src/app.py", "commit", "merge"]
    },
    "commands": [
      {
        "cmd": ["python3", "-c", "from pathlib import Path; import json; text=(Path(r'{source}')/'cs-onboard/reference/execution-conventions.md').read_text(encoding='utf-8'); payload={'requires_owner_judgment': 'owner judgment context' in text, 'subagent_option': 'Subagent Review (recommended)' in text, 'inline_option': 'Inline Review' in text, 'authorization_question': 'Which review authorization should CodeStable use?' in text}; print(json.dumps(payload, sort_keys=True))"],
        "exit_code": 0,
        "json": [
          {"path": "requires_owner_judgment", "equals": true},
          {"path": "subagent_option", "equals": true},
          {"path": "inline_option", "equals": true},
          {"path": "authorization_question", "equals": true}
        ]
      }
    ],
    "git": {
      "must_not_modify": ["**"]
    }
  }
}
