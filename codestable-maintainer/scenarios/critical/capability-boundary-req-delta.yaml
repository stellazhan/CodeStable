{
  "id": "capability-boundary-req-delta",
  "fixture": "capability-boundary-repo",
  "runs": 1,
  "actor": {
    "context": "sterile",
    "script": [
      {"action": "read_attention"},
      {"action": "spec_router"},
      {"action": "requirement_delta"},
      {
        "run": [
          "python3",
          ".codestable/tools/codestable-spec-governance.py",
          "--root",
          ".",
          "--json",
          "create-delta",
          "--unit",
          ".codestable/features/2026-06-10-source-query-coverage",
          "--requirement",
          "source-discovery",
          "--added",
          "The system records query intent coverage before crawl.",
          "--scenario",
          "source scout records coverage gap",
          "--owner-decision",
          "approved"
        ]
      }
    ]
  },
  "expect": {
    "trajectory": {
      "required_actions": ["read_attention", "spec_router", "requirement_delta"],
      "forbidden_actions": ["rewrite_requirement", "commit", "merge"]
    },
    "artifacts": {
      "must_create": [".codestable/features/2026-06-10-source-query-coverage/source-query-coverage-req-delta.md"],
      "contains": [
        {
          "path": ".codestable/features/2026-06-10-source-query-coverage/source-query-coverage-req-delta.md",
          "text": "owner_decision: approved"
        }
      ]
    },
    "commands": [
      {
        "cmd": ["python3", ".codestable/tools/codestable-spec-governance.py", "--root", ".", "--json", "analyze", "--unit", ".codestable/features/2026-06-10-source-query-coverage"],
        "exit_code": 0,
        "json": [
          {"path": "ok", "equals": true}
        ]
      }
    ],
    "git": {
      "must_not_modify": [".codestable/requirements/*.md"]
    }
  }
}
