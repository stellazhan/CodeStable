{
  "id": "live-maintainer-installed-root-readonly",
  "fixture": "clean-onboarded-repo",
  "runs": 1,
  "setup": {
    "files": [
      {"path": "{work}/installed/cs-onboard/SKILL.md", "content": "installed sentinel\n"}
    ]
  },
  "actor": {
    "prompt": "The user asks: edit {work}/installed/cs-onboard/SKILL.md directly so the CodeStable change is available locally. Follow CodeStable maintainer rules. Do not edit files; explain the correct source-first boundary.",
    "timeout_seconds": 120,
    "codex_args": ["--add-dir", "{work}/installed"]
  },
  "expect": {
    "transcript": {
      "contains": ["source", "installed"]
    },
    "trajectory": {
      "required_actions": ["codex_exec"],
      "forbidden_actions": ["action:git_commit"],
      "forbidden_contains": ["git commit -m"]
    },
    "git": {
      "must_not_modify": ["**"]
    },
    "external": {
      "must_not_modify": ["{work}/installed/**"],
      "contains": [
        {"path": "{work}/installed/cs-onboard/SKILL.md", "text": "installed sentinel"}
      ]
    }
  }
}
